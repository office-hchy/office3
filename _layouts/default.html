<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ site.title }}</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ '/assets/images/favicon.png' | relative_url }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
  </head>
  <body>
    <div class="center-logo">
      <img
        src="{{ '/assets/images/logo.png' | relative_url }}"
        alt="Studio Logo"
      />
    </div>

    <main class="horizontal-container" id="scroll-container">
      {{ content }}
    </main>

    <script src="{{ '/assets/js/scroll.js' | relative_url }}"></script>

    <div id="post-overlay" class="post-overlay">
      <div id="overlay-content"></div>
    </div>
  </body>
</html>
