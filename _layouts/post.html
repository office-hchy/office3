<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link
      rel="icon"
      type="image/ico"
      href="{{ '/assets/images/favicon.ico' | relative_url }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
  </head>
  <body class="post-page">
    <a href="{{ '/' | relative_url }}" class="close-btn">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </a>

    <article class="post-content">
      {% if page.images %}
      <div class="post-gallery">
        {% for img_path in page.images %}
        <img
          src="{{ img_path | relative_url }}"
          class="detail-img"
          loading="lazy"
        />
        {% endfor %}
      </div>
      {% endif %}

      <header class="post-header">
        <h1>{{ page.title }}</h1>
      </header>

      <div class="description">{{ content }}</div>
    </article>
  </body>
</html>
