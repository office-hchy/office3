<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
  </head>
  <body class="post-page">
    <nav class="post-nav">
      <a href="{{ '/' | relative_url }}">← 返回藝廊</a>
    </nav>

    <article class="post-content">
      <img
        src="{{ page.cover_image | relative_url }}"
        alt="{{ page.title }}"
        class="detail-img"
      />
      <h1>{{ page.title }}</h1>
      <div class="description">{{ content }}</div>
    </article>
  </body>
</html>
